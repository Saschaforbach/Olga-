<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lernmaterial – Sammlung</title>
<style>
  :root{
    --purple:#7a4e9e; --purple-d:#3d2a52; --purple-l:#f3ecf7;
    --ink:#1d2421; --grey:#5f6b66; --line:#e3e8e5; --bg:#f6f4f9; --card:#fff; --red:#d05050;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,Arial,sans-serif;color:var(--ink);background:var(--bg);line-height:1.55;font-size:18px;}
  .wrap{max-width:860px;margin:0 auto;padding:0 18px;}
  header.hero{background:linear-gradient(135deg,var(--purple-d),var(--purple) 80%,#9a6bbf);color:#fff;padding:50px 0 40px;text-align:center;}
  header.hero h1{margin:0 0 8px;font-size:clamp(2rem,5vw,3rem);font-weight:800;}
  header.hero p{margin:0;opacity:.95;font-size:1.15rem;font-weight:300;}
  .spruch{background:#fff5e6;border-bottom:1px solid #f0e0c0;color:#7a5a14;text-align:center;padding:14px 20px;font-size:1.12rem;font-style:italic;font-weight:500;}
  .spruch button{margin-left:10px;border:none;background:#f0dcae;color:#7a5a14;border-radius:999px;width:28px;height:28px;cursor:pointer;}
  nav{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);}
  nav .wrap{display:flex;flex-wrap:wrap;gap:6px 20px;padding:13px 20px;justify-content:center;}
  nav a{color:var(--purple-d);text-decoration:none;font-weight:600;padding:4px 2px;border-bottom:3px solid transparent;}
  nav a:hover,nav a.active{border-color:var(--purple);}
  /* SEARCH */
  .searchbar{position:sticky;top:50px;z-index:15;background:var(--bg);padding:18px 0 10px;}
  .searchbar input{width:100%;padding:16px 20px;font-size:1.15rem;border:2px solid var(--purple);border-radius:14px;
    font-family:inherit;box-shadow:0 6px 20px rgba(60,42,82,.08);}
  .searchbar input:focus{outline:none;border-color:var(--purple-d);}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
  .chip{background:#fff;border:1.5px solid var(--line);border-radius:999px;padding:7px 15px;font-size:.92rem;cursor:pointer;font-weight:600;color:var(--grey);}
  .chip.active{background:var(--purple);color:#fff;border-color:var(--purple);}
  .count{color:var(--grey);font-size:.95rem;margin:14px 0 6px;}
  /* CARDS */
  .item{background:var(--card);border:1px solid var(--line);border-left:6px solid var(--purple);border-radius:12px;
    padding:18px 20px;margin-bottom:14px;box-shadow:0 4px 16px rgba(60,42,82,.05);}
  .item .top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;}
  .item h3{margin:0;font-size:1.25rem;color:var(--purple-d);}
  .item .meta{font-size:.82rem;color:var(--grey);margin-top:3px;}
  .item .cat{display:inline-block;background:var(--purple-l);color:var(--purple-d);border-radius:999px;padding:2px 11px;font-size:.78rem;font-weight:700;margin-right:6px;}
  .item p{margin:10px 0 0;font-size:1.02rem;white-space:pre-wrap;}
  .item a.link{display:inline-block;margin-top:10px;color:var(--purple);font-weight:700;text-decoration:none;word-break:break-all;}
  .item .del{background:none;border:none;color:var(--red);font-size:1.3rem;cursor:pointer;line-height:1;flex:0 0 auto;}
  .empty{text-align:center;color:var(--grey);font-style:italic;padding:30px 0;}
  /* ADD FORM */
  .add{background:#fff;border:1px dashed var(--purple);border-radius:14px;padding:20px;margin:8px 0 30px;}
  .add h2{margin:0 0 14px;font-size:1.3rem;color:var(--purple-d);}
  .add label{display:block;font-size:.9rem;color:var(--grey);font-weight:600;margin:10px 0 4px;}
  .add input,.add textarea,.add select{width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:10px;font-size:1rem;font-family:inherit;}
  .add textarea{min-height:80px;resize:vertical;}
  .add input:focus,.add textarea:focus,.add select:focus{outline:none;border-color:var(--purple);}
  .add .btns{margin-top:16px;display:flex;gap:10px;flex-wrap:wrap;}
  button.primary{background:var(--purple);color:#fff;border:none;border-radius:10px;padding:12px 20px;font-weight:700;font-size:1rem;cursor:pointer;}
  button.ghost{background:#fff;color:var(--purple);border:1.5px solid var(--purple);border-radius:10px;padding:12px 18px;font-weight:700;cursor:pointer;}
  .toggle{text-align:center;margin:6px 0 0;}
  footer{padding:30px 0 60px;text-align:center;color:var(--grey);font-size:.95rem;}
  @media(max-width:600px){.searchbar{top:46px;}}
.burger{display:none;background:none;border:none;font-size:1.7rem;line-height:1;cursor:pointer;color:#3d2a52;padding:2px 8px;}
@media(max-width:760px){nav .wrap,.subnav{justify-content:flex-start!important;}.burger{display:block;}nav .wrap>a,.subnav>a{display:none;width:100%;padding:9px 2px;}nav .wrap.open>a,.subnav.open>a{display:block;}}
</style>
</head>
<body>
<header class="hero">
  <div class="wrap">
    <h1>Lernmaterial</h1>
    <p>Deine wachsende Sammlung – jeden Tag etwas Neues</p>
  </div>
</header>

<div class="spruch" id="spruch"></div>

<nav><div class="wrap"><button class="burger" aria-label="Menü" onclick="this.closest('.wrap').classList.toggle('open')">☰</button>
  <a href="index.html">Start</a>
  <a href="steuerberater.html">Steuerberater</a>
  <a href="klausuren.html">Klausuren</a>
  <a href="pruefungssimulation.html">Simulation</a>
  <a href="meine-klausuren.html">Meine Klausuren</a>
  <a href="kurs.html">Kurs</a>
  <a href="lernmaterial.html" class="active">Lernmaterial</a>
  <a href="kalender.html">Kalender</a>
  <a href="Partnerin-Tagestracker.html">Mein Tag</a>
</div></nav>

<div class="wrap">
  <div class="searchbar">
    <input id="search" type="search" placeholder="🔍 Suchen … (Titel, Inhalt, Thema)" oninput="render()">
    <div class="chips" id="chips"></div>
  </div>

  <div class="toggle"><button class="ghost" id="toggleAdd" onclick="toggleAdd()">+ Neuen Eintrag hinzufügen</button></div>

  <div class="add" id="addForm" style="display:none;">
    <h2>Neuer Eintrag</h2>
    <label for="f-title">Titel</label>
    <input id="f-title" placeholder="z. B. Umsatzsteuer – Reverse Charge">
    <label for="f-cat">Thema / Kategorie</label>
    <input id="f-cat" list="catlist" placeholder="z. B. Umsatzsteuer">
    <datalist id="catlist"></datalist>
    <label for="f-text">Inhalt / Notiz</label>
    <textarea id="f-text" placeholder="Deine Notiz, Zusammenfassung, Merksatz …"></textarea>
    <label for="f-link">Link (optional)</label>
    <input id="f-link" placeholder="https://…">
    <div class="btns">
      <button class="primary" onclick="addItem()">Speichern</button>
      <button class="ghost" onclick="toggleAdd()">Abbrechen</button>
    </div>
  </div>

  <div class="count" id="count"></div>
  <div id="list"></div>
  <div class="empty" id="empty" style="display:none;">Noch keine Einträge gefunden. Füge oben deinen ersten hinzu.</div>
</div>

<footer><div class="wrap">Alles wird auf diesem Gerät gespeichert · Du schaffst das! 💪</div></footer>

<script>
const KEY="lernmaterial_v1";
// Start-Einträge (kannst du jederzeit löschen oder ergänzen)
const SEED=[
  {id:1,title:"Klausuraufbau im Gutachtenstil",cat:"Klausurtechnik",text:"Frage → Tatbestand → Subsumtion → Ergebnis. Erst Anspruchsgrundlage/Norm nennen, dann am Sachverhalt prüfen. Zeit pro Aufgabe vorher festlegen!",link:""},
  {id:2,title:"Die 3 Klausuren",cat:"Überblick",text:"K1: Verfahrensrecht + USt + ErbSt/Bewertung. K2: Ertragsteuer (ESt, KSt, GewSt). K3: Buchführung & Bilanzwesen.",link:""},
  {id:3,title:"25–30 Übungsklausuren schreiben",cat:"Strategie",text:"Nicht das Wissen entscheidet, sondern die Routine. Vollständige 6-Stunden-Klausuren schreiben UND gründlich nacharbeiten.",link:""},
  {id:4,title:"Prüfungsgebiete (§ 37 StBerG)",cat:"Überblick",text:"Schwerpunkt Steuerrecht: Ertragsteuern, USt, Bilanzsteuerrecht, AO. Dazu Handels-/Gesellschafts-/Insolvenz-/EU-Recht, BWL/Rechnungswesen, VWL, Berufsrecht.",link:"https://www.gesetze-im-internet.de/stberg/__37.html"},
  {id:5,title:"Kostenlose Original-Klausuren + Musterlösungen",cat:"Klausuren",text:"Finanzverwaltung veröffentlicht echte Aufgabentexte (ca. 2 Jahre Karenz), BStBK liefert Lösungsvorschläge.",link:"https://www.haufe.de/steuern/steuerwissen-tipps/bstbk-stellt-musterloesungen-fuer-pruefungsklausuren-bereit_170_628542.html"},
  {id:6,title:"Gratis Übungsklausuren (Endriss)",cat:"Klausuren",text:"Kostenlose Übungsklausuren zum Download.",link:"https://www.endriss.de/weiterbildungskurse/formate/lehrgaenge/steuerberater/download-uebungsklausur/"},
  {id:7,title:"Podcast „Die Steuerberater-Prüfung“",cat:"Motivation",text:"Tipps, Eselsbrücken und Erfahrungen – ideal für unterwegs/zum Abschalten.",link:"https://open.spotify.com/show/3yxC9HmE3f2XiP0xv5ZINX"},
  {id:8,title:"KNOLL Klausurauswertungen (YouTube)",cat:"Video",text:"Echte Klausuren werden Schritt für Schritt ausgewertet.",link:"https://www.youtube.com/playlist?list=PL77_ntLHnaazcjH0CtLEAZFcHEPtqoZ3V"},
  {id:9,title:"Anki-Karteikarten",cat:"Lernmethode",text:"Eigene Karten erstellen und per Spaced Repetition wiederholen – verinnerlicht Standardfälle und macht schnell.",link:"https://apps.ankiweb.net/"},
  {id:10,title:"Zugelassene Hilfsmittel beachten",cat:"Organisation",text:"Nur erlaubte Gesetzes-Textausgaben (z. B. NWB „Wichtige Wirtschaftsgesetze“). Farbmarkierungen & Griffregister ok, KEINE handschriftlichen Notizen im Gesetz!",link:"https://www.haufe.de/steuern/finanzverwaltung/hilfsmittelerlass-wurde-veroeffentlicht_164_636108.html"},
  {id:11,title:"Alle Gesetzestexte gratis online",cat:"Gesetze",text:"AO, EStG, UStG, KStG, GewStG, ErbStG … kostenlos nachschlagen.",link:"https://www.gesetze-im-internet.de/"},
  {id:12,title:"Lernplan von hinten nach vorne",cat:"Strategie",text:"Vom Prüfungstermin rückwärts auf Quartals-/Monatsebene planen. Phase 1 Grundlagen, Phase 2 Anwendung/Klausuren, Phase 3 Klausurtechnik & Vertiefung.",link:""}
];

let data = load();
function load(){ try{const s=JSON.parse(localStorage.getItem(KEY)); if(s) return s;}catch(e){} return SEED.slice(); }
function save(){ try{localStorage.setItem(KEY, JSON.stringify(data));}catch(e){} }

let activeCat="Alle";

function toggleAdd(){ const f=document.getElementById("addForm"); f.style.display = f.style.display==="none"?"block":"none"; }
function addItem(){
  const t=val("f-title"), c=val("f-cat")||"Allgemein", x=val("f-text"), l=val("f-link");
  if(!t && !x){ alert("Bitte mindestens einen Titel oder Inhalt eingeben."); return; }
  data.unshift({id:Date.now(), title:t||"(ohne Titel)", cat:c, text:x, link:l, date:new Date().toLocaleDateString("de-DE")});
  save(); ["f-title","f-cat","f-text","f-link"].forEach(i=>document.getElementById(i).value="");
  toggleAdd(); render();
}
function delItem(id){ if(confirm("Eintrag löschen?")){ data=data.filter(d=>d.id!==id); save(); render(); } }
function val(id){ return document.getElementById(id).value.trim(); }
function esc(s){ return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

function render(){
  const q=document.getElementById("search").value.toLowerCase().trim();
  // Kategorien-Chips
  const cats=["Alle",...Array.from(new Set(data.map(d=>d.cat))).sort()];
  const chips=document.getElementById("chips"); chips.innerHTML="";
  cats.forEach(c=>{ const b=document.createElement("button"); b.className="chip"+(c===activeCat?" active":"");
    b.textContent=c; b.onclick=()=>{activeCat=c;render();}; chips.appendChild(b); });
  // Datalist
  document.getElementById("catlist").innerHTML=cats.filter(c=>c!=="Alle").map(c=>`<option value="${esc(c)}">`).join("");
  // Filtern
  let res=data.filter(d=>activeCat==="Alle"||d.cat===activeCat);
  if(q) res=res.filter(d=>((d.title+" "+d.text+" "+d.cat).toLowerCase().includes(q)));
  // Liste
  const list=document.getElementById("list"); list.innerHTML="";
  document.getElementById("empty").style.display=res.length?"none":"block";
  document.getElementById("count").textContent=res.length+" "+(res.length===1?"Eintrag":"Einträge")+(q||activeCat!=="Alle"?" gefunden":"");
  res.forEach(d=>{
    const div=document.createElement("div"); div.className="item";
    div.innerHTML=`<div class="top"><div>
        <h3>${esc(d.title)}</h3>
        <div class="meta"><span class="cat">${esc(d.cat)}</span>${d.date?("· "+esc(d.date)):""}</div>
      </div></div>
      ${d.text?`<p>${esc(d.text)}</p>`:""}
      ${d.link?`<a class="link" href="${esc(d.link)}" target="_blank" rel="noopener">🔗 ${esc(d.link)}</a>`:""}`;
    const del=document.createElement("button"); del.className="del"; del.textContent="×"; del.title="Löschen"; del.onclick=()=>delItem(d.id);
    div.querySelector(".top").appendChild(del);
    list.appendChild(div);
  });
}

// Spruch
const SPRUECHE=["Jede geübte Klausur bringt dich näher ans Ziel.","Erst die Arbeit, dann das Meer – Zypern wartet. 🌊","Ein Kapitel nach dem anderen.","§ für §, Tag für Tag.","Du hast schon so viel geschafft.","Zukünftige Steuerberaterin im Aufbau. 💪"];
const sp=document.getElementById("spruch");
let si=Math.floor(Date.now()/86400000)%SPRUECHE.length;
function spShow(){ sp.innerHTML="„"+SPRUECHE[si]+"“ <button onclick='spNext()'>↻</button>"; }
function spNext(){ si=(si+1)%SPRUECHE.length; spShow(); }
spShow(); render();
</script>
</body>
</html>
